<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listado de Archivos en GitHub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            margin: 20px;
        }
        h1 {
            text-align: center;
        }
        .directory-list {
            list-style-type: none;
            padding: 0;
        }
        .directory-list li {
            background-color: #ffffff;
            margin: 5px 0;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .directory-list a {
            text-decoration: none;
            color: #007bff;
        }
        .directory-list a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Lista de Archivos en GitHub</h1>
        <ul class="directory-list">
            <li><a href="https://github.com/tizianoluziramos/TrabajosCEPIT/blob/main/archivo1.html">archivo1.html</a></li>
            <li><a href="https://github.com/tizianoluziramos/TrabajosCEPIT/blob/main/archivo2.html">archivo2.html</a></li>
            <li><a href="https://github.com/tizianoluziramos/TrabajosCEPIT/blob/main/carpeta1/archivo3.html">carpeta1/archivo3.html</a></li>
            <li><a href="https://github.com/tizianoluziramos/TrabajosCEPIT/blob/main/carpeta2/archivo4.html">carpeta2/archivo4.html</a></li>
            <li><a href="https://github.com/tizianoluziramos/TrabajosCEPIT/blob/main/carpeta2/archivo5.html">carpeta2/archivo5.html</a></li>
            <!-- Agrega más enlaces aquí según sea necesario -->
        </ul>
    </div>
</body>
</html>
